name: Compatibility Verification

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"
  push:
    branches:
      - main
    paths:
      - "build.gradle.kts"
      - "gradle.properties"
      - "src/main/**"
      - ".github/workflows/compatibility.yml"

permissions:
  contents: read

jobs:
  verify-intellij-compatibility:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Run IntelliJ compatibility verification
        run: ./gradlew compatibilityVerificationCheck --stacktrace

      - name: Upload Plugin Verifier reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-verifier-reports
          path: build/reports/pluginVerifier/**
          if-no-files-found: warn
