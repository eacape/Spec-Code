name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Verify IntelliJ plugin configuration
        run: ./gradlew verifyPluginProjectConfiguration --stacktrace

      - name: Compile plugin
        run: ./gradlew compileKotlin --stacktrace

      - name: Audit oversized ui/spec source files
        run: ./gradlew largeFileWarningAudit --stacktrace

      - name: Guard frozen UI hotspot growth
        run: ./gradlew uiHotspotGrowthGuard --stacktrace

      - name: Run core, architecture, and external process audit regression tests
        run: ./gradlew coreRegressionTest architectureRegressionTest externalProcessAuditTest --stacktrace

      - name: Run workflow and UI smoke tests
        run: ./gradlew workflowSmokeTest --stacktrace

      - name: Package plugin
        run: ./gradlew buildPlugin --stacktrace

      - name: Upload plugin distribution
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-distribution
          path: build/distributions/*.zip
          if-no-files-found: error
