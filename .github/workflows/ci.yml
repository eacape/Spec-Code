name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Compile plugin
        run: ./gradlew compileKotlin --stacktrace

      - name: Audit oversized ui/spec source files
        run: ./gradlew largeFileWarningAudit --stacktrace

      - name: Run core and architecture regression tests
        run: ./gradlew coreRegressionTest architectureRegressionTest --stacktrace

      - name: Package plugin
        run: ./gradlew buildPlugin --stacktrace

      - name: Upload plugin distribution
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-distribution
          path: build/distributions/*.zip
          if-no-files-found: error
